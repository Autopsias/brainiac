version: 2
updates:
  # Python dependencies declared in pyproject.toml (root project).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  # Actions referenced by workflows under .github/workflows/ — keeps the
  # SHA-pinned `uses:` refs (see distribution-matrix.yml) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
