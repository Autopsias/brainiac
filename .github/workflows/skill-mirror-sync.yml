name: Skill Mirror Sync

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  skill-mirror-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Validate packaged client artifacts (frontmatter/JSON/TOML contract)
        run: python3 tools/package_clients.py --validate-only

      - name: Regenerate mirrors from canonical .claude/skills/
        run: python3 tools/package_clients.py

      - name: Fail if mirrors drifted from canonical skills
        run: |
          git diff --exit-code -- \
            .agents/skills \
            plugins/profile-a-kernel/skills \
            plugins/profile-a-extras/skills \
            plugins/brainiac-manager/skills \
            || {
              echo "::error::Skill mirrors are stale or hand-edited. Run 'python3 tools/package_clients.py' and commit the result." >&2
              exit 1
            }
