name: supply-chain

# Supply-chain hardening gate (from the 2026-07-12 cross-family security review).
# Audits the hash-pinned runtime lock (requirements.lock) for known CVEs and
# publishes a CycloneDX SBOM as a build artifact. Runs on PRs, pushes to master,
# and weekly (so a newly-disclosed CVE in an already-pinned dep is caught even
# without a code change).

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC — catch newly-disclosed CVEs
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install pip-audit + cyclonedx
        run: python -m pip install --require-hashes=false pip-audit cyclonedx-bom

      - name: Fail if the lock is stale vs pyproject
        # Regenerate the lock and diff — a drifted lock (a dep added to
        # pyproject but not re-locked) fails the gate so the pinned set can
        # never silently lag the declared deps.
        run: |
          python -m pip install uv
          uv pip compile pyproject.toml --extra mcp --extra ingest --extra embed \
            --generate-hashes -o /tmp/requirements.check.lock
          if ! diff -q requirements.lock /tmp/requirements.check.lock >/dev/null; then
            echo "::error::requirements.lock is stale — re-run: make lock"
            diff requirements.lock /tmp/requirements.check.lock || true
            exit 1
          fi

      - name: Audit pinned dependencies for known CVEs
        # --no-deps: audit exactly the pinned lines (the lock is the closure).
        # Fails the build on any known vulnerability with a fix available.
        run: pip-audit -r requirements.lock --no-deps --desc

      - name: Generate CycloneDX SBOM
        if: always()
        run: cyclonedx-py requirements requirements.lock -o sbom.cyclonedx.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
