<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brainiac Vault Explorer — Link Graph &amp; Semantic Map (3D)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--ink-1);
    overflow: hidden;
  }

  /* ---- theme tokens (palette.md reference instance) ---- */
  .app {
    --surface: #1a1a19;
    --page: #0d0d0d;
    --ink-1: #ffffff;
    --ink-2: #c3c2b7;
    --ink-muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --accent: #3987e5;
    --accent-soft: rgba(57,135,229,0.16);
    --good: #0ca30c;
    --warn: #fab219;
    --serious: #ec835a;
    --critical: #e66767;
    --dup-red: #e66767;
    --mismatch-amber: #c98500;
  }
  :root[data-theme="light"] .app,
  .app.force-light {
    --surface: #fcfcfb;
    --page: #f9f9f7;
    --ink-1: #0b0b0b;
    --ink-2: #52514e;
    --ink-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --accent: #2a78d6;
    --accent-soft: rgba(42,120,214,0.12);
    --good: #006300;
    --warn: #eda100;
    --serious: #eb6834;
    --critical: #e34948;
    --dup-red: #e34948;
    --mismatch-amber: #eda100;
  }

  .app { display: flex; flex-direction: column; height: 100vh; background: var(--page); }

  /* ---------------- topbar ---------------- */
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
    flex-wrap: wrap;
  }
  .brand { font-weight: 600; font-size: 13.5px; color: var(--ink-1); white-space: nowrap; }
  .brand .authoritative-flag {
    display: inline-block; margin-left: 8px; font-weight: 500; font-size: 10.5px;
    color: var(--warn); border: 1px solid var(--warn); border-radius: 3px;
    padding: 1px 5px; vertical-align: middle;
  }
  .tabs { display: flex; gap: 2px; background: var(--page); border-radius: 8px; padding: 2px; }
  .tab {
    appearance: none; border: none; background: transparent; color: var(--ink-2);
    font: inherit; font-size: 12.5px; padding: 6px 12px; border-radius: 6px; cursor: pointer;
  }
  .tab.active { background: var(--surface); color: var(--ink-1); box-shadow: 0 0 0 1px var(--border); }
  .controls { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-wrap: wrap; }
  #search {
    background: var(--page); border: 1px solid var(--border); color: var(--ink-1);
    border-radius: 6px; padding: 6px 10px; font: inherit; font-size: 12.5px; width: 220px;
  }
  #search::placeholder { color: var(--ink-muted); }
  .mode-group { display: flex; gap: 2px; background: var(--page); border-radius: 8px; padding: 2px; }
  .mode-btn {
    appearance: none; border: none; background: transparent; color: var(--ink-2);
    font: inherit; font-size: 11.5px; padding: 5px 9px; border-radius: 6px; cursor: pointer; white-space: nowrap;
  }
  .mode-btn.active { background: var(--accent-soft); color: var(--accent); }
  .icon-btn {
    appearance: none; border: 1px solid var(--border); background: var(--page); color: var(--ink-1);
    border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

  /* ---------------- workspace ---------------- */
  .workspace { flex: 1 1 auto; display: flex; min-height: 0; }
  .canvas-wrap { position: relative; flex: 1 1 auto; min-width: 0; background: var(--surface); }
  canvas { position: absolute; top: 0; left: 0; display: block; width: 100%; height: 100%; cursor: grab; }
  canvas.grabbing { cursor: grabbing; }

  .layer-toggles {
    position: absolute; left: 12px; top: 12px; display: flex; flex-direction: column; gap: 6px;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    font-size: 11.5px; color: var(--ink-2); backdrop-filter: blur(6px);
  }
  .layer-toggles label { display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap; }
  .layer-toggles input { accent-color: var(--accent); }
  .layer-toggles input[type="range"] { width: 100px; }
  .layer-toggles .slider-row { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .layer-toggles .slider-row .slider-val { font-variant-numeric: tabular-nums; color: var(--ink-muted); width: 2.6em; }
  .layer-toggles hr { border: none; border-top: 1px solid var(--border); margin: 2px 0; width: 100%; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex: 0 0 auto; }
  .swatch.line { width: 14px; height: 2px; border-radius: 1px; }

  .legend {
    position: absolute; right: 12px; bottom: 12px; max-width: 240px;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    font-size: 11px; color: var(--ink-2); backdrop-filter: blur(6px);
  }
  .legend-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-muted); margin-bottom: 6px; }
  .legend-row {
    display: flex; align-items: center; gap: 7px; padding: 3px 4px; border-radius: 5px;
    cursor: pointer; justify-content: flex-start;
  }
  .legend-row:hover { background: var(--accent-soft); color: var(--ink-1); }
  .legend-row.is-active { background: var(--accent-soft); color: var(--accent); }
  .legend-row.is-dimmed { opacity: 0.4; }
  .legend-row .swatch { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .legend-row .legend-label { flex: 1 1 auto; }
  .legend-row .count { flex: 0 0 auto; color: var(--ink-muted); font-variant-numeric: tabular-nums; padding-left: 10px; }
  .legend-row.is-active .count { color: var(--accent); }

  .tooltip {
    position: absolute; pointer-events: none; z-index: 20;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 9px; font-size: 11.5px; color: var(--ink-1); max-width: 280px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .tooltip .t-title { font-weight: 600; margin-bottom: 2px; }
  .tooltip .t-meta { color: var(--ink-muted); font-size: 10.5px; }

  .view-footnote {
    position: absolute; left: 12px; bottom: 12px; font-size: 10.5px; color: var(--ink-muted);
    max-width: 46%;
  }

  /* ---------------- sidebar (targets + diagnostics) ---------------- */
  .sidebar {
    flex: 0 0 280px; background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 12px;
  }
  .freshness-banner {
    margin-bottom: 14px; padding: 8px 10px; border-radius: 6px;
    background: var(--accent-soft); border: 1px solid var(--accent);
    color: var(--ink-1); font-size: 11px; line-height: 1.5;
  }
  .freshness-banner b { color: var(--accent); }
  .diag-section { margin-bottom: 16px; }
  .diag-title {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-muted);
    margin: 0 0 8px;
  }
  .diag-row {
    display: flex; justify-content: space-between; align-items: baseline; width: 100%;
    background: none; border: none; color: var(--ink-2); font: inherit; font-size: 12px;
    padding: 5px 6px; border-radius: 5px; cursor: pointer; text-align: left;
  }
  .diag-row:hover { background: var(--accent-soft); color: var(--ink-1); }
  .diag-row.is-active { background: var(--accent-soft); color: var(--accent); }
  .diag-row .v { font-weight: 600; color: var(--ink-1); font-variant-numeric: tabular-nums; }
  .diag-row:hover .v, .diag-row.is-active .v { color: var(--accent); }
  .diag-sub { font-size: 10.5px; color: var(--ink-muted); padding: 0 6px 6px; }
  .hub-list { list-style: none; margin: 0; padding: 0; }
  .hub-list li {
    display: flex; justify-content: space-between; gap: 6px; font-size: 11.5px;
    padding: 3px 6px; border-radius: 5px; cursor: pointer; color: var(--ink-2);
  }
  .hub-list li:hover { background: var(--accent-soft); color: var(--ink-1); }
  .hub-list .hn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hub-list .hv { flex: 0 0 auto; font-variant-numeric: tabular-nums; color: var(--ink-muted); }

  /* ---- targets panel ("where we are vs where we should be") ---- */
  .target-item { margin-bottom: 13px; padding: 4px 6px; border-radius: 6px; }
  .target-item.clickable { cursor: pointer; }
  .target-item.clickable:hover { background: var(--accent-soft); }
  .target-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; font-size: 11.5px; color: var(--ink-2); margin-bottom: 4px; }
  .target-head .target-label { flex: 1 1 auto; }
  .target-head .target-val { flex: 0 0 auto; font-weight: 600; color: var(--ink-1); font-variant-numeric: tabular-nums; }
  .target-track { height: 6px; border-radius: 3px; background: var(--grid); overflow: visible; position: relative; }
  .target-fill { height: 100%; border-radius: 3px; }
  .target-fill.trend {
    background: repeating-linear-gradient(45deg, var(--ink-muted), var(--ink-muted) 4px, transparent 4px, transparent 8px);
  }
  .target-marker {
    position: absolute; top: -2px; width: 2px; height: 10px; background: var(--ink-1); opacity: .55;
  }
  .target-marker.aspirational { background: var(--ink-muted); border-left: 1px dashed var(--ink-muted); width: 0; opacity: .85; }
  .target-foot { font-size: 10px; color: var(--ink-muted); margin-top: 3px; }
  .target-foot .conf { font-style: italic; }

  /* ---------------- details panel ---------------- */
  .details {
    flex: 0 0 300px; background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 14px;
  }
  .details.hidden { display: none; }
  .details h2 { font-size: 14px; margin: 0 0 4px; color: var(--ink-1); }
  .details .d-id { font-size: 11px; color: var(--ink-muted); margin-bottom: 12px; font-family: ui-monospace, monospace; }
  .d-field { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--grid); font-size: 12px; }
  .d-field .k { color: var(--ink-muted); }
  .d-field .v { color: var(--ink-1); font-weight: 500; }
  .flag-row { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
  .flag {
    font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid currentColor;
  }
  .flag.orphan { color: var(--warn); }
  .flag.isolated { color: var(--critical); }
  .flag.dup { color: var(--dup-red); }
  .flag.mismatch { color: var(--mismatch-amber); }
  .flag.notgraph { color: var(--ink-muted); }
  .d-list-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-muted); margin: 14px 0 6px; }
  .d-edge-list, .d-nb-list { list-style: none; margin: 0; padding: 0; }
  .d-edge-list li, .d-nb-list li {
    font-size: 11.5px; padding: 4px 0; color: var(--ink-2); border-bottom: 1px solid var(--grid);
    display: flex; justify-content: space-between; gap: 6px; cursor: pointer;
  }
  .d-edge-list li:hover, .d-nb-list li:hover { color: var(--ink-1); }
  .d-edge-list .kind, .d-nb-list .cos { color: var(--ink-muted); font-variant-numeric: tabular-nums; flex: 0 0 auto; }
  .close-details {
    float: right; background: none; border: none; color: var(--ink-muted); cursor: pointer; font-size: 16px;
  }
  .empty-hint { color: var(--ink-muted); font-size: 12px; padding: 20px 4px; }

  /* ---------------- footer ---------------- */
  .footbar {
    flex: 0 0 auto; display: flex; gap: 18px; flex-wrap: wrap;
    padding: 6px 14px; background: var(--surface); border-top: 1px solid var(--border);
    font-size: 10.5px; color: var(--ink-muted);
  }
  .footbar b { color: var(--ink-2); }
  .footbar .discovery-flag { color: var(--warn); }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--baseline); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="topbar">
    <div class="brand">Brainiac Vault Explorer<span class="authoritative-flag" id="authFlag">discovery layer</span></div>
    <div class="tabs">
      <button class="tab active" data-view="link">Link graph</button>
      <button class="tab" data-view="semantic">Semantic map</button>
    </div>
    <div class="mode-group" id="dimGroup" title="3D: orbit/zoom/pan. 2D: precise reading, exact clicking.">
      <button class="mode-btn active" data-dim="3d">3D</button>
      <button class="mode-btn" data-dim="2d">2D</button>
    </div>
    <div class="controls">
      <input type="search" id="search" placeholder="Search id or title…">
      <div class="mode-group" id="colorModeGroup">
        <button class="mode-btn active" data-mode="classification">Classification</button>
        <button class="mode-btn" data-mode="type">Type</button>
        <button class="mode-btn" data-mode="zone">PARA zone</button>
      </div>
      <button class="icon-btn" id="relayoutBtn" title="Re-run force layout">↻</button>
      <button class="icon-btn active" id="autoRotateBtn" title="Toggle slow auto-rotate (kinetic depth effect — motion parallax reveals 3D structure). Any drag pauses it.">⟳</button>
      <button class="icon-btn" id="themeToggle" title="Toggle light/dark">☀︎</button>
    </div>
  </div>

  <div class="workspace">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas" style="display:none"></canvas>
      <canvas id="canvas3d"></canvas>
      <canvas id="labelOverlay" style="pointer-events:none;"></canvas>
      <div class="layer-toggles" id="layerToggles"></div>
      <div class="legend" id="legend"></div>
      <div class="view-footnote" id="viewFootnote"></div>
      <div class="tooltip" id="tooltip" hidden></div>
    </div>
    <aside class="sidebar" id="sidebar"></aside>
    <aside class="details hidden" id="details"></aside>
  </div>

  <div class="footbar" id="footbar"></div>
</div>

<script type="application/json" id="payload-data">__BRAIN_GRAPHREPORT_PAYLOAD_JSON__</script>

<script>
(function () {
  "use strict";

  // ======================================================================
  // 0. load payload
  // ======================================================================
  const RAW = JSON.parse(document.getElementById("payload-data").textContent);

  const nodesById = new Map();
  RAW.nodes.forEach(n => nodesById.set(n.id, n));
  const pointsById = new Map();
  RAW.points.forEach(p => pointsById.set(p.id, p));
  const orphanSet = new Set(RAW.orphans);
  const edgesByNode = new Map(); // id -> [{other, kind, dir}]
  RAW.edges.forEach(e => {
    if (!edgesByNode.has(e.from)) edgesByNode.set(e.from, []);
    if (!edgesByNode.has(e.to)) edgesByNode.set(e.to, []);
    edgesByNode.get(e.from).push({ other: e.to, kind: e.kind, dir: "out" });
    edgesByNode.get(e.to).push({ other: e.from, kind: e.kind, dir: "in" });
  });
  const dupPairSet = new Set();
  RAW.duplicate_pairs.forEach(p => { dupPairSet.add(p.a + "|" + p.b); dupPairSet.add(p.b + "|" + p.a); });
  const mismatchPairSet = new Set();
  RAW.mismatch_pairs.forEach(p => { mismatchPairSet.add(p.a + "|" + p.b); mismatchPairSet.add(p.b + "|" + p.a); });

  // ======================================================================
  // 1. color formula (dataviz skill: ordinal ramp for classification,
  //    fixed-order categorical for type / zone) -- unchanged from the 2D
  //    build, already validated (palette.md documented default).
  // ======================================================================
  const THEME = { mode: "dark" };

  const CLASSIFICATION_ORDER = ["Public", "Internal", "Confidential", "Restricted", "MNPI"];
  const CLASS_RAMP = {
    dark:  ["#cde2fb", "#86b6ef", "#3987e5", "#256abf", "#184f95"],
    light: ["#86b6ef", "#3987e5", "#256abf", "#184f95", "#0d366b"],
  };

  const CAT_SLOTS = {
    dark:  ["#3987e5", "#008300", "#d55181", "#c98500", "#199e70", "#d95926", "#9085e9", "#e66767"],
    light: ["#2a78d6", "#008300", "#e87ba4", "#eda100", "#1baf7a", "#eb6834", "#4a3aa7", "#e34948"],
  };
  const MUTED = { dark: "#55544e", light: "#c3c2b7" };

  const TYPE_SLOT = {
    note: 0, decision: 1, concept: 2, project: 3,
    person: 4, company: 5, daily: 6, index: 7,
  };
  const TYPE_MUTED = new Set(["source", "draft", "source-derived"]);

  const ZONE_SLOT = {
    projects: 0, areas: 1, resources: 2, archive: 3,
    "brain-root": 4, "cos-ops": 5, overlay: 6, raw: 7,
  };

  function classColor(cls) {
    const i = CLASSIFICATION_ORDER.indexOf(cls);
    const ramp = CLASS_RAMP[THEME.mode];
    return ramp[i >= 0 ? i : ramp.length - 1];
  }
  function typeColor(t) {
    if (TYPE_MUTED.has(t) || !(t in TYPE_SLOT)) return MUTED[THEME.mode];
    return CAT_SLOTS[THEME.mode][TYPE_SLOT[t]];
  }
  function zoneColor(z) {
    if (!(z in ZONE_SLOT)) return MUTED[THEME.mode];
    return CAT_SLOTS[THEME.mode][ZONE_SLOT[z]];
  }
  const COLOR_MODES = {
    classification: { fn: classColor, key: "classification", legendOrder: CLASSIFICATION_ORDER, kind: "ordinal" },
    type: { fn: typeColor, key: "type", legendOrder: ["note","decision","concept","project","person","company","daily","index","(raw/draft)"], kind: "categorical" },
    zone: { fn: zoneColor, key: "zone", legendOrder: ["projects","areas","resources","archive","brain-root","cos-ops","overlay","raw"], kind: "categorical" },
  };
  let colorMode = "classification";

  function hexToRgb01(hex) {
    const v = hex.replace("#", "");
    const r = parseInt(v.substring(0, 2), 16) / 255;
    const g = parseInt(v.substring(2, 4), 16) / 255;
    const b = parseInt(v.substring(4, 6), 16) / 255;
    return [r, g, b];
  }

  // ======================================================================
  // 2. shared state (spans BOTH the 2D canvas and the 3D WebGL renderer,
  //    and BOTH the link-graph and semantic-map views)
  // ======================================================================
  let currentView = "link";     // "link" | "semantic"
  let mode3D = true;            // 3D is the default; 2D is the precision fallback
  let selectedId = null;
  let searchQuery = "";
  let hoverId = null;
  let hoverIsPoint = false;
  // INFERRED off by default -- discovery-layer noise at full density (research:
  // Eric J. Ma "Principles of Network Visualization" -- filter unnecessary edges
  // before styling the rest); flip the "Show INFERRED edges" toggle to see them.
  const layerState = { dup: true, mismatch: true, lens: true, inferred: false, topEdges: true };
  const legendIsolate = new Set(); // raw key-values isolated via legend click; empty = show all

  function isDimmedByLegend(keyVal) {
    return legendIsolate.size > 0 && !legendIsolate.has(keyVal);
  }
  function isDimmed(id, keyVal) {
    const bySearch = searchQuery && !matchIds.has(id);
    return bySearch || isDimmedByLegend(keyVal);
  }

  // ---- edge opacity (user slider) + top-edges decluttering ----------------
  let edgeOpacityMul = 1.0;
  // "top edges" ranks WIKILINK edges by (endpoint degree sum) as a cheap proxy
  // for importance -- this dataset carries no per-edge weight, so endpoint
  // degree is the honest available signal (TGI-EB / divided-edge-bundling
  // research: importance-based filtering is a legitimate declutter strategy
  // even without full bundling). Capped at nodeCount*4 so small graphs show
  // everything and only genuinely dense ones get thinned.
  const TOP_EDGES_K = Math.max(200, Math.min(RAW.edges.length, RAW.nodes.length * 4));
  const topEdgeSet = new Set();
  (function rankEdges() {
    const scored = RAW.edges
      .map((e, idx) => {
        const da = (nodesById.get(e.from) || {}).degree || 0;
        const db = (nodesById.get(e.to) || {}).degree || 0;
        return [idx, da + db];
      })
      .sort((a, b) => b[1] - a[1]);
    for (let k = 0; k < Math.min(TOP_EDGES_K, scored.length); k++) topEdgeSet.add(scored[k][0]);
  })();
  function edgeVisible(e, idx) {
    if (e.kind === "INFERRED" && !layerState.inferred) return false;
    if (layerState.topEdges && !topEdgeSet.has(idx)) return false;
    return true;
  }

  // ---- focus+context: hover/select brightens self + 1-2 hop neighborhood,
  // ghosts everything else. Highest-leverage legibility fix for a hairball
  // (Elmqvist et al., "Dynamic Transparency for 3D Visualization": dynamic
  // occlusion management beats static transparency for target discovery).
  // Cross-fades over FOCUS_ANIM_MS between the previous and next focus state
  // so nothing pops.
  const FOCUS_ANIM_MS = 150;
  const GHOST_ALPHA = 0.05;
  let focusSet = null, prevFocusSet = null, focusAnimStart = 0, focusAnimating = false;

  function neighborhoodIds(id, hops) {
    const out = new Set([id]);
    let frontier = [id];
    for (let h = 0; h < hops; h++) {
      const next = [];
      for (const cur of frontier) {
        for (const e of (edgesByNode.get(cur) || [])) {
          if (e.kind === "INFERRED" && !layerState.inferred) continue;
          if (!out.has(e.other)) { out.add(e.other); next.push(e.other); }
        }
      }
      frontier = next;
      if (!frontier.length) break;
    }
    return out;
  }
  function semanticNeighborhoodIds(id) {
    const out = new Set([id]);
    (RAW.neighbors[id] || []).forEach(nb => out.add(nb.id));
    return out;
  }
  function computeFocusSet() {
    const id = hoverId || selectedId;
    if (!id) return null;
    if (currentView === "link") return neighborhoodIds(id, 2);
    return semanticNeighborhoodIds(id);
  }
  function updateFocus() {
    const next = computeFocusSet();
    const changed = (next === null) !== (focusSet === null) ||
      (next && focusSet && (next.size !== focusSet.size || ![...next].every(x => focusSet.has(x))));
    if (!changed) return;
    prevFocusSet = focusSet;
    focusSet = next;
    focusAnimStart = performance.now();
    if (!focusAnimating) {
      focusAnimating = true;
      const tick = () => {
        requestRender();
        if (performance.now() - focusAnimStart < FOCUS_ANIM_MS) requestAnimationFrame(tick);
        else focusAnimating = false;
      };
      requestAnimationFrame(tick);
    }
  }
  function focusEase() {
    const p = Math.min(1, (performance.now() - focusAnimStart) / FOCUS_ANIM_MS);
    return p * p * (3 - 2 * p); // smoothstep
  }
  // blends id's alpha between the "no focus" baseAlpha and whichever of
  // focusSet/prevFocusSet is relevant, so unrelated nodes don't flicker when
  // focus moves from one node straight to another.
  function focusAlpha(id, baseAlpha) {
    if (!focusSet && !prevFocusSet) return baseAlpha;
    const t = focusEase();
    const from = prevFocusSet ? (prevFocusSet.has(id) ? 1 : GHOST_ALPHA) : baseAlpha;
    const to = focusSet ? (focusSet.has(id) ? 1 : GHOST_ALPHA) : baseAlpha;
    return from + (to - from) * t;
  }
  function focusEdgeAlpha(fromId, toId, baseAlpha) {
    if (!focusSet && !prevFocusSet) return baseAlpha;
    const t = focusEase();
    const from = prevFocusSet ? ((prevFocusSet.has(fromId) && prevFocusSet.has(toId)) ? Math.max(baseAlpha, 0.5) : GHOST_ALPHA * 0.4) : baseAlpha;
    const to = focusSet ? ((focusSet.has(fromId) && focusSet.has(toId)) ? Math.max(baseAlpha, 0.5) : GHOST_ALPHA * 0.4) : baseAlpha;
    return from + (to - from) * t;

  // ======================================================================
  // 3. 2D canvas + camera (unchanged mechanics from the prior build)
  // ======================================================================
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const wrap = document.getElementById("canvasWrap");
  const camera2D = { link: { x: 0, y: 0, zoom: 1 }, semantic: { x: 0, y: 0, zoom: 1 } };
  let dpr = Math.max(1, window.devicePixelRatio || 1);

  // ======================================================================
  // 3b. 3D WebGL canvas + camera (orbit / zoom / shift-pan)
  // ======================================================================
  const canvas3d = document.getElementById("canvas3d");
  const gl = canvas3d.getContext("webgl", { antialias: true, alpha: false, depth: true, preserveDrawingBuffer: false });
  const labelOverlay = document.getElementById("labelOverlay");
  const labelCtx = labelOverlay.getContext("2d");

  // orbit camera: yaw/pitch around a target point, distance = zoom.
  const camera3DState = {
    link:     { yaw: 0.6, pitch: 0.35, dist: 900, target: { x: 0, y: 0, z: 0 } },
    semantic: { yaw: 0.6, pitch: 0.35, dist: 1400, target: { x: 0, y: 0, z: 0 } },
  };
  const INITIAL_DIST = { link: camera3DState.link.dist, semantic: camera3DState.semantic.dist };
  const PITCH_LIMIT = 1.45;

  // ---- slow auto-rotate (kinetic depth effect) -----------------------------
  // Motion parallax from a slow, continuous orbit is how humans read 3D
  // structure without stereo vision (Wallach & O'Connell 1953, "The Kinetic
  // Depth Effect"; still the standard citation for structure-from-motion).
  // Any drag pauses it immediately; it resumes the instant the drag ends,
  // matching the conventional OrbitControls.autoRotate UX.
  let autoRotate = true;
  const AUTO_ROTATE_RAD_PER_MS = 0.00028; // ~1 full turn per ~6 minutes
  let lastFrameTime = 0;

  function resizeCanvas() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    const r = wrap.getBoundingClientRect();
    canvas.width = Math.round(r.width * dpr);
    canvas.height = Math.round(r.height * dpr);
    canvas3d.width = Math.round(r.width * dpr);
    canvas3d.height = Math.round(r.height * dpr);
    labelOverlay.width = Math.round(r.width * dpr);
    labelOverlay.height = Math.round(r.height * dpr);
    if (gl) gl.viewport(0, 0, canvas3d.width, canvas3d.height);
  }
  window.addEventListener("resize", resizeCanvas);

  function worldToScreen(x, y, cam) {
    const w = canvas.width, h = canvas.height;
    return [
      w / 2 + cam.x * dpr + x * cam.zoom * dpr,
      h / 2 + cam.y * dpr + y * cam.zoom * dpr,
    ];
  }
  function screenToWorld(px, py, cam) {
    const w = canvas.width, h = canvas.height;
    return [
      (px - w / 2 - cam.x * dpr) / (cam.zoom * dpr),
      (py - h / 2 - cam.y * dpr) / (cam.zoom * dpr),
    ];
  }

  // -------- tiny column-major mat4 helpers (no external libs) --------
  function mat4Perspective(fovy, aspect, near, far) {
    const f = 1 / Math.tan(fovy / 2);
    const out = new Float32Array(16);
    out[0] = f / aspect; out[5] = f;
    out[10] = (far + near) / (near - far); out[11] = -1;
    out[14] = (2 * far * near) / (near - far);
    return out;
  }
  function vec3Sub(a, b) { return [a[0] - b[0], a[1] - b[1], a[2] - b[2]]; }
  function vec3Cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function vec3Norm(a) { const l = Math.hypot(a[0], a[1], a[2]) || 1; return [a[0]/l, a[1]/l, a[2]/l]; }
  function vec3Dot(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }

  function mat4LookAt(eye, target, up) {
    const z = vec3Norm(vec3Sub(eye, target)); // camera looks down -z
    const x = vec3Norm(vec3Cross(up, z));
    const y = vec3Cross(z, x);
    const out = new Float32Array(16);
    out[0]=x[0]; out[1]=y[0]; out[2]=z[0]; out[3]=0;
    out[4]=x[1]; out[5]=y[1]; out[6]=z[1]; out[7]=0;
    out[8]=x[2]; out[9]=y[2]; out[10]=z[2]; out[11]=0;
    out[12] = -vec3Dot(x, eye); out[13] = -vec3Dot(y, eye); out[14] = -vec3Dot(z, eye); out[15] = 1;
    return out;
  }
  function mat4Multiply(a, b) {
    const out = new Float32Array(16);
    for (let c = 0; c < 4; c++) {
      for (let r = 0; r < 4; r++) {
        let sum = 0;
        for (let k = 0; k < 4; k++) sum += a[k*4 + r] * b[c*4 + k];
        out[c*4 + r] = sum;
      }
    }
    return out;
  }
  // apply a column-major mat4 to a vec4, matching the uniformMatrix4fv upload
  // convention used below (transpose=false) -- kept in lockstep with the
  // vertex shader's `uMVP * vec4(pos,1.0)` so CPU-side picking agrees with
  // what the GPU actually draws.
  function mat4TransformVec4(m, x, y, z, w) {
    return [
      m[0]*x + m[4]*y + m[8]*z  + m[12]*w,
      m[1]*x + m[5]*y + m[9]*z  + m[13]*w,
      m[2]*x + m[6]*y + m[10]*z + m[14]*w,
      m[3]*x + m[7]*y + m[11]*z + m[15]*w,
    ];
  }

  function orbitEye(cam) {
    const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
    const cy = Math.cos(cam.yaw), sy = Math.sin(cam.yaw);
    return [
      cam.target.x + cam.dist * cp * sy,
      cam.target.y + cam.dist * sp,
      cam.target.z + cam.dist * cp * cy,
    ];
  }
  function orbitBasis(cam) {
    const eye = orbitEye(cam);
    const forward = vec3Norm(vec3Sub([cam.target.x, cam.target.y, cam.target.z], eye));
    const worldUp = [0, 1, 0];
    let right = vec3Cross(forward, worldUp);
    if (Math.hypot(right[0], right[1], right[2]) < 1e-5) right = [1, 0, 0];
    right = vec3Norm(right);
    const up = vec3Norm(vec3Cross(right, forward));
    return { eye, forward, right, up };
  }
  function mvpFor(cam, aspect) {
    const eye = orbitEye(cam);
    const view = mat4LookAt(eye, [cam.target.x, cam.target.y, cam.target.z], [0, 1, 0]);
    const proj = mat4Perspective(Math.PI / 3.6, aspect, 1, cam.dist * 20 + 4000);
    return mat4Multiply(proj, view);
  }

  function projectPoint(mvp, x, y, z, vw, vh) {
    const clip = mat4TransformVec4(mvp, x, y, z, 1);
    if (clip[3] <= 0.001) return null; // behind the camera
    const ndcX = clip[0] / clip[3], ndcY = clip[1] / clip[3];
    return { sx: (ndcX * 0.5 + 0.5) * vw, sy: (1 - (ndcY * 0.5 + 0.5)) * vh, w: clip[3] };
  }

  // pan / zoom / orbit (shared handlers, act on the active view's camera --
  // 2D canvas gets the pan/zoom mechanics it always had; 3D canvas gets
  // orbit-drag + shift-drag pan + wheel-dolly).
  let dragging = false, dragLast = null, clickMoved = 0;

  canvas.addEventListener("pointerdown", e => {
    dragging = true; dragLast = [e.clientX, e.clientY];
    canvas.classList.add("grabbing");
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener("pointerup", e => {
    dragging = false; canvas.classList.remove("grabbing");
    if (dragLast && clickMoved < 4) handleClick2D(e);
    dragLast = null;
  });
  canvas.addEventListener("pointermove", e => {
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left), py = (e.clientY - rect.top);
    if (dragging && dragLast) {
      const dx = e.clientX - dragLast[0], dy = e.clientY - dragLast[1];
      clickMoved += Math.abs(dx) + Math.abs(dy);
      const cam = camera2D[currentView];
      cam.x += dx; cam.y += dy;
      dragLast = [e.clientX, e.clientY];
      requestRender();
    } else {
      clickMoved = 0;
      handleHover2D(px * dpr, py * dpr, e.clientX, e.clientY);
    }
  });
  canvas.addEventListener("pointerleave", () => { hoverId = null; updateFocus(); hideTooltip(); requestRender(); });
  canvas.addEventListener("wheel", e => {
    e.preventDefault();
    const cam = camera2D[currentView];
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * dpr, my = (e.clientY - rect.top) * dpr;
    const [wx, wy] = screenToWorld(mx, my, cam);
    const factor = Math.exp(-e.deltaY * 0.0016);
    cam.zoom = Math.min(8, Math.max(0.02, cam.zoom * factor));
    const [nx, ny] = screenToWorld(mx, my, cam);
    cam.x += (nx - wx) * cam.zoom;
    cam.y += (ny - wy) * cam.zoom;
    requestRender();
  }, { passive: false });

  function handleClick2D(e) {
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) * dpr, py = (e.clientY - rect.top) * dpr;
    const id = hitTest2D(px, py);
    if (id) selectNode(id); else deselect();
  }

  // -------- 3D orbit/pan/zoom pointer handlers --------
  let drag3DLast = null, drag3DMoved = 0;
  canvas3d.addEventListener("pointerdown", e => {
    drag3DLast = [e.clientX, e.clientY, e.shiftKey];
    drag3DMoved = 0;
    canvas3d.classList.add("grabbing");
    canvas3d.setPointerCapture(e.pointerId);
  });
  canvas3d.addEventListener("pointerup", e => {
    canvas3d.classList.remove("grabbing");
    if (drag3DLast && drag3DMoved < 4) handleClick3D(e);
    drag3DLast = null;
  });
  canvas3d.addEventListener("pointermove", e => {
    const rect = canvas3d.getBoundingClientRect();
    const px = e.clientX - rect.left, py = e.clientY - rect.top;
    if (drag3DLast) {
      const dx = e.clientX - drag3DLast[0], dy = e.clientY - drag3DLast[1];
      drag3DMoved += Math.abs(dx) + Math.abs(dy);

        const { right, up } = orbitBasis(cam);
        const panScale = cam.dist * 0.0016;
        cam.target.x += (-dx * panScale) * right[0] + (dy * panScale) * up[0];
        cam.target.y += (-dx * panScale) * right[1] + (dy * panScale) * up[1];
        cam.target.z += (-dx * panScale) * right[2] + (dy * panScale) * up[2];
